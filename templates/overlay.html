<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Výsledkový overlay</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@500;600;700&family=Rajdhani:wght@500;600;700&family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #F52525;
            --accent-soft: rgba(245, 37, 37, 0.85);
            --gold: #FFD24A;
            --silver: #CBD5E1;
            --bronze: #E0915A;
            --panel-top: rgba(28, 28, 30, 0.92);
            --panel-bottom: rgba(14, 14, 16, 0.94);
            --row-a: rgba(255, 255, 255, 0.06);
            --row-b: rgba(255, 255, 255, 0.02);
            --text: #f2f2f2;
            --text-dim: #b8b8b8;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            /* Chroma-key green by default – fullscreen the window and key it out in OBS.
               Override with ?bg=RRGGBB, or ?transparent=1 for an OBS browser source. */
            background: #00b140;
            font-family: 'Barlow Semi Condensed', system-ui, sans-serif;
            color: var(--text);
            overflow: hidden;
        }

        /* ---------- shared panel ---------- */
        .panel {
            position: absolute;
            background: linear-gradient(180deg, var(--panel-top) 0%, var(--panel-bottom) 100%);
            border-radius: 14px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.55), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            overflow: hidden;
            opacity: 0;
            transform: translateY(18px);
            animation: panelIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            will-change: transform, opacity;
        }
        @keyframes panelIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Result / total tables: anchored from the top so the header never moves while
           paging – the panel simply grows/shrinks downward with the row count. */
        .panel--table {
            top: 60px;
            left: 50%;
            transform: translate(-50%, 18px);
            width: min(1500px, 92vw);
        }
        .panel--table.shown { animation: tableIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        @keyframes tableIn {
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        /* Running competitors: lower third */
        .panel--list {
            left: 50%;
            bottom: 60px;
            transform: translate(-50%, 18px);
            width: min(1500px, 92vw);
        }
        .panel--list.shown { animation: listIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        @keyframes listIn {
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        /* ---------- nameplate (manual lower third) ---------- */
        .panel--nameplate {
            left: 70px;
            bottom: 70px;
            transform: translateY(18px);
            display: flex;
            align-items: stretch;
            max-width: 70vw;
            padding: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(180deg, rgba(32,32,36,0.96) 0%, rgba(18,18,22,0.97) 100%);
        }
        .panel--nameplate.shown { animation: npIn 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        @keyframes npIn { to { opacity: 1; transform: translateY(0); } }

        /* left cell: flag on top, international abbr underneath */
        .np__badge {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px 22px;
            background: rgba(255, 255, 255, 0.05);
        }
        .np__flag {
            font-size: 2.5rem;
            line-height: 1;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.4));
        }
        .np__abbr {
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 0.95rem;
            letter-spacing: 2px;
            color: #fff;
            background: var(--accent);
            padding: 2px 12px;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(245, 37, 37, 0.35);
        }

        .np__text {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 5px;
            padding: 16px 34px;
        }
        .np__name {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.2px;
            color: #fff;
            white-space: nowrap;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.35);
        }
        .np__role {
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            color: var(--gold);
            white-space: nowrap;
        }

        /* ---------- header ---------- */
        .panel__header {
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 16px 26px;
            background: linear-gradient(90deg, var(--accent) 0%, #8B1A1A 100%);
            position: relative;
        }
        .panel__header::after {
            content: "";
            position: absolute;
            left: 0; right: 0; bottom: 0;
            height: 3px;
            background: rgba(0, 0, 0, 0.25);
        }
        .panel__flame { font-size: 1.8rem; line-height: 1; }
        .panel__titles { display: flex; flex-direction: column; line-height: 1.05; }
        .panel__title {
            font-size: 1.7rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.35);
        }
        .panel__subtitle {
            font-size: 1.05rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: 0.4px;
        }
        .panel__badge {
            margin-left: auto;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 1.15rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 6px 16px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            white-space: nowrap;
        }
        .panel__page {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 1px;
            padding: 6px 14px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.35);
            color: #fff;
            white-space: nowrap;
        }
        /* Freeze the panel in place (no entrance slide) on page flips and live updates,
           so the header never moves while paging. `rows-only` still animates the rows. */
        .no-anim .panel, .rows-only .panel { animation: none; opacity: 1; transform: none; }
        .no-anim .panel--table, .rows-only .panel--table { transform: translate(-50%, 0); }
        .no-anim .panel--list, .rows-only .panel--list { transform: translate(-50%, 0); }
        /* live update: also keep the rows static */
        .no-anim tbody tr { animation: none; }

        /* ---------- table ---------- */
        table { width: 100%; border-collapse: collapse; }
        thead th {
            font-size: 0.95rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-dim);
            text-align: left;
            padding: 12px 18px;
            background: rgba(0, 0, 0, 0.25);
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        }
        tbody td {
            padding: 0 18px;
            font-size: 1.35rem;
            font-weight: 500;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            white-space: nowrap;
            vertical-align: middle;
        }
        /* Fixed row height so data rows (with rank badge) and filler rows match exactly */
        .panel--table tbody tr { height: 56px; }
        .panel--list tbody tr { height: 46px; }
        tbody tr { animation: rowIn 0.35s ease forwards; will-change: transform, opacity; }
        @keyframes rowIn {
            from { opacity: 0; transform: translateX(-8px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        tr.row-a { background: var(--row-a); }
        tr.row-b { background: var(--row-b); }
        tr.running {
            background: linear-gradient(90deg, rgba(245, 37, 37, 0.28), rgba(245, 37, 37, 0.05));
            box-shadow: inset 3px 0 0 var(--accent);
        }

        .col-num { text-align: center; width: 70px; }
        .col-flagabbr { white-space: nowrap; width: 130px; }
        .col-flagabbr .fl-em { font-size: 1.5rem; vertical-align: middle; margin-right: 8px; }
        .col-flagabbr .fl-ab { font-family: 'Rajdhani', sans-serif; font-weight: 700; letter-spacing: 1px; vertical-align: middle; }
        .col-name { font-weight: 700; }
        .num { font-family: 'Rajdhani', sans-serif; font-weight: 600; text-align: center; }
        .dim { color: var(--text-dim); font-weight: 500; }

        /* rank badge */
        .rank {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 38px;
            height: 38px;
            padding: 0 8px;
            border-radius: 9px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 1.35rem;
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
        }
        .rank.gold   { background: linear-gradient(180deg, #FFE48A, var(--gold)); color: #3a2a00; box-shadow: 0 0 14px rgba(255, 210, 74, 0.5); }
        .rank.silver { background: linear-gradient(180deg, #eef2f7, var(--silver)); color: #1d2530; }
        .rank.bronze { background: linear-gradient(180deg, #f0ad7e, var(--bronze)); color: #3a1d00; }

        /* track color dot for single racers */
        .track-dot {
            display: inline-block;
            width: 14px; height: 14px;
            border-radius: 50%;
            margin-right: 10px;
            vertical-align: middle;
            box-shadow: 0 0 6px rgba(0, 0, 0, 0.6);
        }

        /* list panel rows are a touch tighter */
        .panel--list tbody td { font-size: 1.25rem; }

        /* Column group separator – left border on first column of each group */
        th.grp, td.grp { border-left: 2px solid rgba(255,255,255,0.18); }

        /* Highlighted sum / best columns */
        td.col-sum  { color: #fff; font-weight: 700; }
        td.col-best { font-weight: 700; }
        td.col-best .best-gold   { color: var(--gold); }
        td.col-best .best-silver { color: var(--silver); }
        td.col-best .best-bronze { color: var(--bronze); }

        /* Rotated header cells (celkové výsledky) */
        th.th-rot {
            height: 145px;
            vertical-align: bottom;
            padding: 0 6px 10px;
            text-align: center;
            width: 72px;
            overflow: visible;
        }
        th.th-rot > .rot-text {
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            display: inline-block;
            white-space: nowrap;
            font-size: 0.88rem;
            letter-spacing: 0.3px;
        }

        #empty {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(0, 0, 0, 0.45);
            font-size: 1.3rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        /* Hide the placeholder text on transparent (OBS browser source) backgrounds */
        body.transparent #empty { display: none; }
    </style>
</head>
<body>
    <div id="empty">Čekám na data…</div>
    <div id="stage"></div>

    <script>
        const params = new URLSearchParams(location.search);
        const POLL_MS = 300;
        const PAGE_SIZE = 10;                                   // max rows shown at once
        const PAGE_MS = (parseInt(params.get("pagesec"), 10) || 8) * 1000; // time per page
        const stage = document.getElementById("stage");
        let lastSignature = null;
        let currentView = null;   // last built view holding ALL rows
        let currentPage = 0;      // rotating page index (advanced independently of data)
        let lastViewKey = null;   // identity of the panel (kind/header/columns)
        let lastPage = null;      // last rendered page index
        let autoPaging = true;    // off => page is driven manually via the control panel / Stream Deck
        let manualPage = 1;       // 1-based page to show when auto-rotation is off

        // Background: chroma green by default; ?transparent=1 for OBS browser source; ?bg=RRGGBB to override
        if (params.has("transparent")) {
            document.body.style.background = "transparent";
            document.body.classList.add("transparent");
        } else if (params.get("bg")) {
            document.body.style.background = "#" + params.get("bg").replace(/[^0-9a-fA-F]/g, "");
        }

        // ---------- helpers ----------
        const fmt = (v) => (v === null || v === undefined || v === "") ? "–" : v;
        const fmtT = (v) => {
            if (v === null || v === undefined || v === "") return "–";
            const n = parseFloat(v);
            return (isNaN(n) || n === 0) ? "–" : v;
        };
        function rankBest(val, order) {
            const v = fmtT(val);
            if (v === "–") return v;
            const n = parseInt(order, 10);
            if (n === 1) return `<span class="best-gold">${v}</span>`;
            if (n === 2) return `<span class="best-silver">${v}</span>`;
            if (n === 3) return `<span class="best-bronze">${v}</span>`;
            return v;
        }

        function parseContent(jsonStr) {
            try {
                return (JSON.parse(jsonStr || "{}").content) || [];
            } catch (e) {
                return [];
            }
        }

        function rankCell(value) {
            const n = parseInt(value, 10);
            let cls = "rank";
            if (n === 1) cls += " gold";
            else if (n === 2) cls += " silver";
            else if (n === 3) cls += " bronze";
            return `<span class="${cls}">${fmt(value)}</span>`;
        }

        function trackDot(color) {
            const c = (color && color !== 0) ? color : "#666";
            return `<span class="track-dot" style="background:${c}"></span>`;
        }

        // ---------- column definitions per view ----------
        // Each column: { h: header, get: (row) => html, cls: cellClass }
        const COL = {
            rank: (key) => ({ h: "#", cls: "col-num", get: (r) => rankCell(r[key]) }),
            name: { h: "Tým / Závodník", cls: "col-name", get: (r) => fmt(r.name) },
            sdh:    { h: "SDH",  cls: "dim", get: (r) => fmt(r.SDH) },
            county: { h: "Kraj", cls: "dim", get: (r) => fmt(r.county) },
            num:  (key, h) => ({ h, cls: "num", get: (r) => fmt(r[key]) }),
        };

        // Returns a view descriptor based on the visibility flags in the payload.
        function buildView(d) {
            const header = fmt(d.raceName) + (d.racePlace ? "  •  " + d.racePlace : "");
            const cat = fmt(d.categoryCustom || d.category);
            const ev = d.selected_event && d.selected_event !== "-" ? d.selected_event : "";
            const sub = ev ? `${cat}  —  ${ev}` : cat;

            // ----- nameplate (lower third): manual caption, takes precedence -----
            if (d.nameplateVisible) {
                return {
                    kind: "nameplate",
                    name: d.nameplateName || "",
                    flag: d.nameplateFlag || "",
                    abbr: d.nameplateAbbr || "",
                    role: d.nameplateRole || "",
                };
            }

            // ----- running-team lišta from Google Sheet (start# | flag+abbr | team [| kat.]) -----
            if (d.sheetListVisible) {
                const scols = [
                    { h: "#", cls: "col-num", get: (r) => fmt(r.startNumber) },
                    { h: "Země", cls: "col-flagabbr", get: (r) =>
                        `<span class="fl-em">${r.flag || ""}</span><span class="fl-ab">${r.abbr || ""}</span>` },
                    { ...COL.name, h: "Tým", get: (r) => fmt(r.name) },
                ];
                // Show the category only when all categories are shown (no single-category filter)
                if (d.sheetShowCategory) {
                    scols.push({ h: "Kategorie", cls: "dim", get: (r) => fmt(r.category) });
                }
                return list(d.sheetTitle || "", "Na trati", scols, parseContent(d.sheetContent));
            }

            // ----- result table: single & single-multidiscipline discipline -----
            if (d.racersResultTableVisible) {
                return table(header, sub, ev || "Výsledky", [
                    COL.rank("selectedEventOrder"),
                    COL.name, COL.sdh,
                    COL.num("time1", "1. pokus"),
                    COL.num("time2", "2. pokus"),
                    COL.num("finalTime", "Výsledek"),
                ], parseContent(d.tableContentVysledky));
            }
            // ----- single-multidiscipline total -----
            if (d.singlesMultieventTotalTableVisible) {
                return table(header, "Celkové výsledky — " + cat, "Celkem", [
                    COL.rank("order"),
                    COL.name, COL.sdh,
                    COL.num("hurdlesOrder", "Překážky"),
                    COL.num("phpOrder", "PHP"),
                    COL.num("totalSum", "Součet"),
                ], parseContent(d.tableContentVysledky));
            }
            // ----- CTIF result -----
            if (d.CTIFResultTableVisible) {
                return table(header, sub, ev || "Výsledky", [
                    COL.rank("order"),
                    COL.name,
                    COL.num("attempt1_selectedEventPoints", "1. body"),
                    COL.num("attempt1_selectedEventPenaltyPoints", "1. TB"),
                    COL.num("attempt1_selectedEventSumPoints", "1. součet"),
                    COL.num("attempt2_selectedEventPoints", "2. body"),
                    COL.num("attempt2_selectedEventPenaltyPoints", "2. TB"),
                    COL.num("attempt2_selectedEventSumPoints", "2. součet"),
                    COL.num("bestPoints", "Nejlepší"),
                ], parseContent(d.tableContentVysledky));
            }
            // ----- Plamen result -----
            if (d.plamenResultTableVisible) {
                const evName = d.selected_event || "";
                const fullPenalty = evName === "Štafeta dvojic" || evName === "Štafeta CTIF" || evName === "PÚ CTIF";
                const simplePenalty = false;
                const cols = [COL.rank("selectedEventOrder"), COL.name, COL.county];
                if (fullPenalty) {
                    cols.push({ h: "1. čas",    cls: "num",          groupSep: true,  get: r => fmtT(r.attempt1_selectedEventPoints) });
                    cols.push({ h: "1. TB",     cls: "num",                           get: r => fmtT(r.attempt1_selectedEventPenaltyPoints) });
                    cols.push({ h: "1. součet", cls: "num col-sum",                   get: r => fmtT(r.attempt1_selectedEventSumPoints) });
                    cols.push({ h: "2. čas",    cls: "num",          groupSep: true,  get: r => fmtT(r.attempt2_selectedEventPoints) });
                    cols.push({ h: "2. TB",     cls: "num",                           get: r => fmtT(r.attempt2_selectedEventPenaltyPoints) });
                    cols.push({ h: "2. součet", cls: "num col-sum",                   get: r => fmtT(r.attempt2_selectedEventSumPoints) });
                    cols.push({ h: "Nejlepší",  cls: "num col-best", groupSep: true,  get: r => rankBest(r.selectedEventBestPoints, r.selectedEventOrder) });
                } else if (simplePenalty) {
                    // PÚ CTIF – pouze celkový čas (s trestnými body, bez rozpisu)
                    cols.push({ h: "1. čas",   cls: "num",          groupSep: true, get: r => fmtT(r.attempt1_selectedEventSumPoints) });
                    cols.push({ h: "2. čas",   cls: "num",          groupSep: true, get: r => fmtT(r.attempt2_selectedEventSumPoints) });
                    cols.push({ h: "Nejlepší", cls: "num col-best", groupSep: true, get: r => rankBest(r.selectedEventBestPoints, r.selectedEventOrder) });
                } else {
                    // PÚ Plamen, Štafeta 4×60 m – čistý čas bez trestů
                    cols.push({ h: "1. pokus", cls: "num",          groupSep: true, get: r => fmtT(r.attempt1_selectedEventPoints) });
                    cols.push({ h: "2. pokus", cls: "num",          groupSep: true, get: r => fmtT(r.attempt2_selectedEventPoints) });
                    cols.push({ h: "Nejlepší", cls: "num col-best", groupSep: true, get: r => rankBest(r.selectedEventBestPoints, r.selectedEventOrder) });
                }
                return table(header, sub, ev || "Výsledky", cols, parseContent(d.tableContentVysledky));
            }
            // ----- Plamen total -----
            if (d.totalResultsTableVisible) {
                const rot = (key, label) => ({
                    h: label, cls: "num", hcls: "th-rot", rotated: true, groupSep: true,
                    get: r => fmtT(r[key])
                });
                return table(header, "Celkové výsledky — " + cat, "Celkem", [
                    COL.rank("totalOrder"),
                    COL.name, COL.county,
                    rot("fireAttackBestPoints",    "PÚ Plamen"),
                    rot("relayBestPoints",         "Štafeta 4×60 m"),
                    rot("pairsBestPoints",         "Štafeta dvojic"),
                    rot("ctif400BestPoints",       "Štafeta CTIF"),
                    rot("ctifFireAttackBestPoints","PÚ CTIF"),
                    { h: "Celkem", cls: "num col-best", groupSep: true, get: r => rankBest(r.totalSum, r.totalOrder) },
                ], parseContent(d.tableContentVysledky));
            }
            // ----- Dorost result -----
            if (d.dorostTableVisible) {
                return table(header, sub, ev || "Výsledky", [
                    COL.rank("selectedEventOrder"),
                    COL.name, COL.sdh,
                    COL.num("attempt1_selectedEventPoints", "1. pokus"),
                    COL.num("attempt2_selectedEventPoints", "2. pokus"),
                    COL.num("selectedEventBestPoints", "Nejlepší"),
                ], parseContent(d.tableContentVysledky));
            }
            // ----- Dorost total -----
            if (d.dorostTotalResultsTableVisible) {
                return table(header, fmt(d.totalResultsTitle) || ("Celkové výsledky — " + cat), "Celkem", [
                    COL.rank("totalOrder"),
                    COL.name, COL.sdh,
                    COL.num("fireAttackOrder", "Útok"),
                    COL.num("relayOrder", "Štafeta"),
                    COL.num("run100mOrder", "Běh 100 m"),
                    COL.num("totalSum", "Součet"),
                ], parseContent(d.tableContentVysledky));
            }
            // ----- TFA result -----
            if (d.TFATableVisible) {
                return table(header, sub, "TFA", [
                    COL.rank("selectedEventOrder"),
                    COL.name, COL.sdh,
                    COL.num("finalTime", "Čas"),
                ], parseContent(d.tableContentVysledky));
            }

            // ===== running competitor lists (lower third) =====
            const running = parseContent(d.tableContentAktualniZavodnici);

            if (d.racersListVisible || d.singlesMultieventListVisible || d.TFAListVisible) {
                return list(sub, "Na trati", [
                    { h: "", cls: "", get: (r) => trackDot(r.trackColor) + fmt(r.name), hcls: "col-name" },
                    COL.sdh,
                    COL.num("time1", "1. pokus"),
                    COL.num("time2", "2. pokus"),
                    COL.num("finalTime", "Výsledek"),
                ], running);
            }
            if (d.CTIFListVisible) {
                return list(sub, "Na trati", [
                    { ...COL.name, h: "Tým" },
                    COL.num("attempt1_selectedEventSumPoints", "1. součet"),
                    COL.num("attempt2_selectedEventSumPoints", "2. součet"),
                    COL.num("bestPoints", "Nejlepší"),
                ], running);
            }
            if (d.plamenListVisible) {
                const evName = d.selected_event || "";
                const fullPenalty = evName === "Štafeta dvojic" || evName === "Štafeta CTIF" || evName === "PÚ CTIF";
                const simplePenalty = false;
                const lcols = [{ ...COL.name, h: "Tým" }, COL.county];
                if (fullPenalty) {
                    lcols.push({ h: "1. čas",    cls: "num",          groupSep: true, get: r => fmtT(r.attempt1_selectedEventPoints) });
                    lcols.push({ h: "1. TB",     cls: "num",                          get: r => fmtT(r.attempt1_selectedEventPenaltyPoints) });
                    lcols.push({ h: "1. součet", cls: "num col-sum",                  get: r => fmtT(r.attempt1_selectedEventSumPoints) });
                    lcols.push({ h: "2. čas",    cls: "num",          groupSep: true, get: r => fmtT(r.attempt2_selectedEventPoints) });
                    lcols.push({ h: "2. TB",     cls: "num",                          get: r => fmtT(r.attempt2_selectedEventPenaltyPoints) });
                    lcols.push({ h: "2. součet", cls: "num col-sum",                  get: r => fmtT(r.attempt2_selectedEventSumPoints) });
                    lcols.push({ h: "Nejlepší",  cls: "num col-best", groupSep: true, get: r => rankBest(r.selectedEventBestPoints, r.selectedEventOrder) });
                } else if (simplePenalty) {
                    lcols.push({ h: "1. čas",   cls: "num",          groupSep: true, get: r => fmtT(r.attempt1_selectedEventSumPoints) });
                    lcols.push({ h: "2. čas",   cls: "num",          groupSep: true, get: r => fmtT(r.attempt2_selectedEventSumPoints) });
                    lcols.push({ h: "Nejlepší", cls: "num col-best", groupSep: true, get: r => rankBest(r.selectedEventBestPoints, r.selectedEventOrder) });
                } else {
                    lcols.push({ h: "1. pokus", cls: "num",          groupSep: true, get: r => fmtT(r.attempt1_selectedEventPoints) });
                    lcols.push({ h: "2. pokus", cls: "num",          groupSep: true, get: r => fmtT(r.attempt2_selectedEventPoints) });
                    lcols.push({ h: "Nejlepší", cls: "num col-best", groupSep: true, get: r => rankBest(r.selectedEventBestPoints, r.selectedEventOrder) });
                }
                return list(sub, "Na trati", lcols, running);
            }
            if (d.dorostListVisible) {
                return list(sub, "Na trati", [
                    { ...COL.name, h: "Tým" }, COL.sdh,
                    COL.num("attempt1_selectedEventPoints", "1. pokus"),
                    COL.num("attempt2_selectedEventPoints", "2. pokus"),
                    COL.num("selectedEventBestPoints", "Nejlepší"),
                ], running);
            }

            return null;
        }

        function table(header, sub, badge, cols, rows) {
            return { kind: "table", header, sub, badge, cols, rows };
        }
        function list(header, badge, cols, rows) {
            return { kind: "list", header, sub: "", badge, cols, rows };
        }

        // ---------- rendering ----------
        function renderView(v, rows, page, pageCount) {
            const pager = pageCount > 1 ? `<span class="panel__page">${page + 1} / ${pageCount}</span>` : "";
            const headEls = `
                <div class="panel__header">
                    <span class="panel__flame">🔥</span>
                    <div class="panel__titles">
                        <span class="panel__title">${v.header}</span>
                        ${v.sub ? `<span class="panel__subtitle">${v.sub}</span>` : ""}
                    </div>
                    ${v.badge ? `<span class="panel__badge">${v.badge}</span>` : ""}
                    ${pager}
                </div>`;

            const thead = "<tr>" + v.cols.map(c => {
                const base = c.hcls || c.cls || "";
                const cls = [base, c.groupSep ? "grp" : ""].filter(Boolean).join(" ");
                const inner = c.rotated ? `<span class="rot-text">${c.h}</span>` : c.h;
                return `<th class="${cls}">${inner}</th>`;
            }).join("") + "</tr>";

            const tbody = rows.map((r, i) => {
                const isRunning = r.isRunning === "1" && v.kind === "table";
                const cls = isRunning ? "running" : (i % 2 === 0 ? "row-a" : "row-b");
                const tds = v.cols.map(c => {
                    const tdCls = [c.cls || "", c.groupSep ? "grp" : ""].filter(Boolean).join(" ");
                    return `<td class="${tdCls}">${c.get(r)}</td>`;
                }).join("");
                return `<tr class="${cls}" style="animation-delay:${Math.min(i * 30, 400)}ms">${tds}</tr>`;
            }).join("");

            const panelCls = v.kind === "table" ? "panel panel--table shown" : "panel panel--list shown";
            return `<div class="${panelCls}">${headEls}<table><thead>${thead}</thead><tbody>${tbody}</tbody></table></div>`;
        }

        function pageCountOf(view) {
            if (!view || !view.rows) return 1;
            return Math.max(1, Math.ceil(view.rows.length / PAGE_SIZE));
        }

        // Nameplate lower third: flag + abbr stacked on the left, name + role on the right.
        function renderNameplate(v) {
            const flag = v.flag ? `<span class="np__flag">${v.flag}</span>` : "";
            const abbr = v.abbr ? `<span class="np__abbr">${v.abbr}</span>` : "";
            const badge = (flag || abbr) ? `<div class="np__badge">${flag}${abbr}</div>` : "";
            const name = v.name ? `<div class="np__name">${v.name}</div>` : "";
            const role = v.role ? `<div class="np__role">${v.role}</div>` : "";
            return `<div class="panel panel--nameplate shown">
                ${badge}
                <div class="np__text">${name}${role}</div>
            </div>`;
        }

        // Renders the current page of the current view. Animations replay only when the
        // layout (view kind / page count / page index) changes, not on live time updates.
        function renderCurrent() {
            // Nameplate is a single caption – no rows, no paging.
            if (currentView && currentView.kind === "nameplate") {
                document.getElementById("empty").style.display = "none";
                const viewKey = `nameplate|${currentView.flag}|${currentView.name}|${currentView.abbr}|${currentView.role}`;
                stage.classList.toggle("no-anim", viewKey === lastViewKey);
                stage.classList.remove("rows-only");
                lastViewKey = viewKey;
                lastPage = null;
                stage.innerHTML = renderNameplate(currentView);
                return;
            }
            if (!currentView || !currentView.rows.length) {
                stage.innerHTML = "";
                lastViewKey = null;
                lastPage = null;
                document.getElementById("empty").style.display = "";
                return;
            }
            document.getElementById("empty").style.display = "none";

            const pc = pageCountOf(currentView);
            if (!autoPaging) currentPage = manualPage - 1;   // manual mode: page comes from the control panel
            currentPage = ((currentPage % pc) + pc) % pc;
            const start = currentPage * PAGE_SIZE;
            const pageRows = currentView.rows.slice(start, start + PAGE_SIZE);

            // Decide what to animate:
            //   new view  -> animate panel + rows
            //   page flip  -> animate rows only (panel/header stays fixed)
            //   live data  -> animate nothing (update values in place)
            const viewKey = `${currentView.kind}|${currentView.header}|${currentView.cols.length}`;
            let mode = "full";
            if (viewKey === lastViewKey) mode = (currentPage === lastPage) ? "none" : "rows";
            stage.classList.toggle("no-anim", mode === "none");
            stage.classList.toggle("rows-only", mode === "rows");
            lastViewKey = viewKey;
            lastPage = currentPage;

            stage.innerHTML = renderView(currentView, pageRows, currentPage, pc);
        }

        // Apply a freshly polled /data payload (text = raw JSON string, used as signature).
        function handleData(text) {
            try {
                const d = JSON.parse(text);
                if (text !== lastSignature) {
                    lastSignature = text;
                    autoPaging = d ? d.autoPaging !== false : true;
                    manualPage = (d && d.selectedPage) ? d.selectedPage : 1;
                    currentView = (d && Object.keys(d).length) ? buildView(d) : null;
                    renderCurrent();
                }
            } catch (e) {
                // keep last frame on bad/partial payloads
            }
        }

        // OBS browser sources render "in the background", where Chromium throttles
        // setInterval to ~1×/s. A Web Worker's timers are NOT throttled, so polling from a
        // worker keeps OBS as responsive as a foreground browser tab.
        function startPolling() {
            const dataUrl = location.origin + "/data";
            try {
                const code = `let url='',ms=300;onmessage=e=>{url=e.data.url;ms=e.data.ms;setInterval(tick,ms);tick();};` +
                    `async function tick(){try{const r=await fetch(url,{cache:'no-store'});postMessage(await r.text());}catch(e){}}`;
                const worker = new Worker(URL.createObjectURL(new Blob([code], { type: "application/javascript" })));
                worker.onmessage = (e) => handleData(e.data);
                worker.postMessage({ url: dataUrl, ms: POLL_MS });
            } catch (e) {
                // Fallback: main-thread polling (may be throttled in OBS, but works everywhere)
                const poll = async () => {
                    try { const r = await fetch(dataUrl, { cache: "no-store" }); handleData(await r.text()); } catch (e) {}
                };
                poll();
                setInterval(poll, POLL_MS);
            }
        }

        // Auto-rotate pages independently of data polling
        function nextPage() {
            if (!autoPaging) return;   // manual mode: no auto-rotation
            if (currentView && pageCountOf(currentView) > 1) {
                currentPage++;
                renderCurrent();
            }
        }

        startPolling();
        setInterval(nextPage, PAGE_MS);
    </script>
</body>
</html>
